services:
  esphome:
    image: esphome/esphome:2026.4.5
    container_name: esphome
    restart: unless-stopped
    volumes:
      - .:/config:rw           # repo root → /config inside the container
    working_dir: /config
    command: ["version"]

  # Integration test runner — sends test scenarios to the physical device
  # 
  # Setup (once):
  #   cp .env.example .env        # then edit .env and fill in ENCRYPTION_KEY
  #
  # Usage (with .env file — Docker Compose reads it automatically):
  #   docker compose run --rm test
  #   docker compose run --rm test --filter "corner"
  #   docker compose run --rm test --delay 2
  test:
    image: python:3.12-slim
    network_mode: host          # needed to reach mDNS (*.local) on the LAN
    volumes:
      - .:/workspace:ro
    working_dir: /workspace
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DEVICE_HOST=${DEVICE_HOST}
    entrypoint: ["sh", "-c", "pip install aioesphomeapi --quiet && python -m tests.test_display \"$@\"", "--"]
    profiles:
      - test                    # not started by 'docker compose up'
