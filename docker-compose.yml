services:
  esphome:
    image: esphome/esphome:2026.4.5
    container_name: esphome
    restart: unless-stopped
    volumes:
      - .:/config:rw           # repo root → /config inside the container
    working_dir: /config
    command: ["version"]

  # Integration test runner — sends test scenarios to the physical device
  # 
  # Setup (once):
  #   cp .env.example .env        # then edit .env and paste your ENCRYPTION_KEY
  #
  # Usage (inline key):
  #   ENCRYPTION_KEY="<your-key>" docker compose run --rm test
  #
  # Usage (with .env file — Docker Compose reads it automatically):
  #   docker compose run --rm test
  test:
    image: python:3.12-slim
    network_mode: host          # needed to reach mDNS (*.local) on the LAN
    volumes:
      - .:/workspace:ro
    working_dir: /workspace
    environment:
      - ENCRYPTION_KEY          # pass through from host environment
    entrypoint: ["sh", "-c", "pip install aioesphomeapi --quiet && python tests/test_display.py \"$@\"", "--"]
    profiles:
      - test                    # not started by 'docker compose up'
