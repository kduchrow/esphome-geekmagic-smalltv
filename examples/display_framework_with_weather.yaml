esphome:
  name: smalltv-with-weather
  friendly_name: smalltv-with-weather
  platformio_options:
    board_build.f_cpu: 160000000L

esp8266:
  board: esp12e

external_components:
  - source:
      type: git
      url: https://github.com/kduchrow/esphome-geekmagic-smalltv
      ref: main
    components: [display_framework]
  - source:
      type: git
      url: https://github.com/lhartmann/esphome-st7789v-fractional-framebuffer
      ref: main
    refresh: 0s
    components: [st7789v]

logger:

api:
  reboot_timeout: 0s
  custom_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin

font:
  - id: text_font_14
    file: "gfonts://Roboto"
    size: 14
  - id: icon_font_48
    file:
      type: web
      url: https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf
    size: 48
    glyphs:
      - "\U000F0026" # mdi-alert-circle-outline
      - "\U000F009A" # mdi-bell
      - "\U000F009F" # mdi-bell-ring
      - "\U000F0590" # mdi-weather-cloudy
      - "\U000F0591" # mdi-weather-fog
      - "\U000F0592" # mdi-weather-hail
      - "\U000F0593" # mdi-weather-lightning
      - "\U000F0594" # mdi-weather-night
      - "\U000F0595" # mdi-weather-partly-cloudy
      - "\U000F0596" # mdi-weather-pouring
      - "\U000F0597" # mdi-weather-rainy
      - "\U000F0598" # mdi-weather-snowy
      - "\U000F0599" # mdi-weather-sunny
      - "\U000F059D" # mdi-weather-windy
      - "\U000F059E" # mdi-weather-windy-variant
      - "\U000F067E" # mdi-weather-lightning-rainy
      - "\U000F067F" # mdi-weather-snowy-rainy

sensor:
  - platform: wifi_signal
    id: wifi_signal_db
    name: WiFi Signal
  - platform: homeassistant
    id: ha_sun_elevation
    entity_id: sun.sun
    attribute: elevation

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip_address
      name: IP Address
      entity_category: diagnostic
  - platform: homeassistant
    id: ha_weather_state
    entity_id: weather.home

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware
  id: spihwd

display:
  - id: my_display
    platform: st7789v
    model: custom
    spi_id: spihwd
    height: 240
    width: 240
    offset_height: 0
    offset_width: 0
    fragmentation: 30
    dc_pin: GPIO00
    reset_pin: GPIO02
    eightbitcolor: False
    update_interval: never
    spi_mode: mode3
    data_rate: 40000000
    auto_clear_enabled: True
    pages:
      - id: framework
        lambda: |-
          id(dfw).render(it);

display_framework:
  id: dfw
  display_id: my_display
  time_id: sntp_time
  text_font: text_font_14
  icon_font: icon_font_48
  show_weather: true
  weather_state: ha_weather_state
  sun_elevation: ha_sun_elevation
  wifi_signal: wifi_signal_db
  wifi_ip: wifi_ip_address
