esphome:
  name: smalltv-with-weather
  friendly_name: smalltv-with-weather
  platformio_options:
    board_build.f_cpu: 160000000L

esp8266:
  board: esp12e

external_components:
  - source:
      type: git
      url: https://github.com/kduchrow/esphome-geekmagic-smalltv
      ref: main
    components: [display_framework]
  - source:
      type: git
      url: https://github.com/lhartmann/esphome-st7789v-fractional-framebuffer
      ref: main
    refresh: 0s
    components: [st7789v]

logger:

api:
  reboot_timeout: 0s
  custom_services: true
  encryption:
    key: "Pu0T9XatYALpR2HBL1wSrskkeKgLALswWayVbIkVFP0="

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin

font:
  - id: text_font_14
    file: "gfonts://Roboto"
    size: 14
  - id: text_font_20
    file: "gfonts://Roboto"
    size: 20
  - id: icon_font_48
    file:
      type: web
      url: https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf
    size: 48
    glyphs:
      - "\U000F0026" # mdi-alert-circle-outline
      - "\U000F009A" # mdi-bell
      - "\U000F009F" # mdi-bell-ring
      - "\U000F0590" # mdi-weather-cloudy
      - "\U000F0591" # mdi-weather-fog
      - "\U000F0592" # mdi-weather-hail
      - "\U000F0593" # mdi-weather-lightning
      - "\U000F0594" # mdi-weather-night
      - "\U000F0595" # mdi-weather-partly-cloudy
      - "\U000F0596" # mdi-weather-pouring
      - "\U000F0597" # mdi-weather-rainy
      - "\U000F0598" # mdi-weather-snowy
      - "\U000F0599" # mdi-weather-sunny
      - "\U000F059D" # mdi-weather-windy
      - "\U000F059E" # mdi-weather-windy-variant
      - "\U000F067E" # mdi-weather-lightning-rainy
      - "\U000F067F" # mdi-weather-snowy-rainy
  # Optional: small icon font for the clock icon in the time bar.
  - id: icon_font_14
    file:
      type: web
      url: https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf
    size: 14
    glyphs:
      - "\U000F0954" # mdi-clock-outline

sensor:
  - platform: wifi_signal
    id: wifi_signal_db
    name: WiFi Signal
  - platform: homeassistant
    id: ha_sun_elevation
    entity_id: sun.sun
    attribute: elevation

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip_address
      name: IP Address
      entity_category: diagnostic
  - platform: homeassistant
    id: ha_weather_state
    entity_id: weather.home

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware
  id: spihwd

display:
  - id: my_display
    platform: st7789v
    model: custom
    spi_id: spihwd
    height: 240
    width: 240
    offset_height: 0
    offset_width: 0
    fragmentation: 30
    dc_pin: GPIO00
    reset_pin: GPIO02
    eightbitcolor: False
    update_interval: never
    spi_mode: mode3
    data_rate: 40000000
    auto_clear_enabled: True
    pages:
      - id: framework
        lambda: |-
          id(dfw).render(it);

display_framework:
  id: dfw
  display_id: my_display
  time_id: sntp_time
  text_font: text_font_14
  text_font_large: text_font_20  # optional: used when set_page sends font_size: 1
  icon_font: icon_font_48
  time_icon_font: icon_font_14   # small clock glyph in the time bar

  # --- Time format (strftime syntax) ---
  # %H:%M        → 14:30        24 h, no seconds
  # %H:%M:%S     → 14:30:00     24 h with seconds
  # %I:%M %p     → 02:30 PM     12 h AM/PM
  time_format: "%H:%M"

  # --- Date format (strftime syntax) ---
  # %d.%m        → 20.05        day.month
  # %d.%m.%Y     → 20.05.2026   full date with year
  # %a %d.%m     → Di 20.05     abbreviated weekday + date
  # %d %b        → 20 May       day + abbreviated month name
  date_format: "%d.%m"

  update_interval: 200ms
  show_time: true             # set false to hide clock/date bar
  show_weather: true
  show_default_header: true   # set false for fullscreen card layout
  # default_header_title: "MY DEVICE"    # optional fixed header title
  # default_header_subtitle: "Ready"     # optional fixed header subtitle
  weather_state: ha_weather_state
  sun_elevation: ha_sun_elevation
  wifi_signal: wifi_signal_db
  wifi_ip: wifi_ip_address
  max_headers: 3
  header_rotation_interval: 5s
