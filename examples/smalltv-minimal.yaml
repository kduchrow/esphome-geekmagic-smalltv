esphome:
  name: geekmagic-smalltv-01
  friendly_name: geekmagic-smalltv-01
  platformio_options:
    board_build.f_cpu: 160000000L
  on_boot:
    - priority: 600
      then:
        - delay: 1s
        - output.turn_on: pwm_output
        - output.set_level:
            id: pwm_output
            level: 50%

esp8266:
  board: esp12e

external_components:
  - source:
      type: git
      url: https://github.com/kduchrow/esphome-geekmagic-smalltv
      ref: main
    components: [display_framework]
  - source:
      type: git
      url: https://github.com/lhartmann/esphome-st7789v-fractional-framebuffer
      ref: main
    refresh: 0s
    components: [st7789v]

logger:

api:
  reboot_timeout: 0s
  custom_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  id: default_wifi
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: !secret ap_ssid
    password: !secret ap_password

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin    # adjust to your timezone
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

font:
  - id: text_font_14
    file: "gfonts://Roboto"
    size: 14
  - id: text_font_20
    file: "gfonts://Roboto"
    size: 20
  - id: icon_font_48
    file:
      type: web
      url: https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf
    size: 48
    glyphs:
      - "\U000F0026" # mdi-alert-circle-outline
      - "\U000F009A" # mdi-bell
      - "\U000F009F" # mdi-bell-ring
      - "\U000F0079" # mdi-battery
      - "\U000F0084" # mdi-battery-charging
      - "\U000F0241" # mdi-flash
      - "\U000F02DC" # mdi-home
      - "\U000F0590" # mdi-weather-cloudy
      - "\U000F0591" # mdi-weather-fog
      - "\U000F0592" # mdi-weather-hail
      - "\U000F0593" # mdi-weather-lightning
      - "\U000F0594" # mdi-weather-night
      - "\U000F0595" # mdi-weather-partly-cloudy
      - "\U000F0596" # mdi-weather-pouring
      - "\U000F0597" # mdi-weather-rainy
      - "\U000F0598" # mdi-weather-snowy
      - "\U000F0599" # mdi-weather-sunny
      - "\U000F059D" # mdi-weather-windy
      - "\U000F059E" # mdi-weather-windy-variant
      - "\U000F067E" # mdi-weather-lightning-rainy
      - "\U000F067F" # mdi-weather-snowy-rainy
      - "\U000F0A72" # mdi-solar-power
      - "\U000F140B" # mdi-lightning-bolt
  # Optional: small icon font for the clock icon in the time bar.
  # Remove this block (and time_icon_font below) if you don't want a clock icon.
  - id: icon_font_14
    file:
      type: web
      url: https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf
    size: 14
    glyphs:
      - "\U000F0954" # mdi-clock-outline

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware
  id: spihwd

output:
  - id: pwm_output
    platform: esp8266_pwm
    pin: GPIO05
    inverted: true
    frequency: 1000 Hz

light:
  - platform: monochromatic
    output: pwm_output
    name: "Backlight"
    restore_mode: RESTORE_AND_ON

sensor:
  - platform: wifi_signal
    id: wifi_signal_db
    name: WiFi Signal

text_sensor:
  - platform: wifi_info
    ip_address:
      id: wifi_ip_address
      name: IP Address
      entity_category: diagnostic

display:
  - id: my_display
    platform: st7789v
    model: custom
    spi_id: spihwd
    height: 240
    width: 240
    offset_height: 0
    offset_width: 0
    fragmentation: 30
    dc_pin: GPIO00
    reset_pin: GPIO02
    eightbitcolor: False
    update_interval: never
    spi_mode: mode3
    data_rate: 40000000
    auto_clear_enabled: True
    pages:
      - id: framework
        lambda: |-
          id(dfw).render(it);

display_framework:
  id: dfw
  display_id: my_display
  time_id: sntp_time
  text_font: text_font_14
  text_font_large: text_font_20      # enables font_size: 1 in set_page calls
  icon_font: icon_font_48
  time_icon_font: icon_font_14       # remove if you removed icon_font_14 above

  # --- Time format (strftime syntax) ---
  # %H:%M        → 14:30        24 h, no seconds       ← compact, recommended
  # %H:%M:%S     → 14:30:00     24 h with seconds
  # %I:%M %p     → 02:30 PM     12 h AM/PM
  time_format: "%H:%M"

  # --- Date format (strftime syntax) ---
  # %d.%m        → 20.05        day.month              ← compact, recommended
  # %d.%m.%Y     → 20.05.2026   full date with year
  # %a %d.%m     → Di 20.05     abbreviated weekday + date (locale-dependent)
  # %d %b        → 20 May       day + abbreviated month name
  date_format: "%d.%m"

  max_pages: 5
  delimiter: "-|-"
  rotation_interval: 20s
  expiry_interval: 10s
  update_interval: 200ms
  show_time: true             # set false to hide the entire time/date bar
  show_weather: false
  show_default_header: true   # set false for fullscreen card layout
  # default_header_title: "MY DEVICE"    # optional fixed header title
  # default_header_subtitle: "Ready"     # optional fixed header subtitle
  wifi_signal: wifi_signal_db
  wifi_ip: wifi_ip_address
  max_headers: 3
  header_rotation_interval: 5s
