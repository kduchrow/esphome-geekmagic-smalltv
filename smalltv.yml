esphome:
  name: geekmagic-smalltv-01
  friendly_name: geekmagic-smalltv-01
  platformio_options:
    board_build.f_cpu: 160000000L
  on_boot:
    - priority: 600
      then:
        - delay: 1s
        - output.turn_on: pwm_output
        - output.set_level:
            id: pwm_output
            level: 50%

esp8266:
  board: esp12e

external_components:
  - source:
      type: git
      url: https://github.com/kduchrow/esphome-geekmagic-smalltv
      ref: main
    components: [display_framework]
  - source:
      type: git
      url: https://github.com/lhartmann/esphome-st7789v-fractional-framebuffer
      ref: main
    refresh: 0s
    components: [st7789v]

logger:

api:
  reboot_timeout: 0s
  custom_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  id: default_wifi
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: !secret ap_ssid
    password: !secret ap_password

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org

font:
  - id: text_font_14
    file: "gfonts://Roboto"
    size: 14
  - id: icon_font_48
    file:
      type: web
      url: https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/fonts/materialdesignicons-webfont.ttf
    size: 48
    glyphs:
      - "\U000F0026" # mdi-alert-circle-outline
      - "\U000F009A" # mdi-bell
      - "\U000F009F" # mdi-bell-ring
      - "\U000F0079" # mdi-battery
      - "\U000F0084" # mdi-battery-charging
      - "\U000F0241" # mdi-flash
      - "\U000F02DC" # mdi-home
      - "\U000F0590" # mdi-weather-cloudy
      - "\U000F0591" # mdi-weather-fog
      - "\U000F0592" # mdi-weather-hail
      - "\U000F0593" # mdi-weather-lightning
      - "\U000F0594" # mdi-weather-night
      - "\U000F0595" # mdi-weather-partly-cloudy
      - "\U000F0596" # mdi-weather-pouring
      - "\U000F0597" # mdi-weather-rainy
      - "\U000F0598" # mdi-weather-snowy
      - "\U000F0599" # mdi-weather-sunny
      - "\U000F059D" # mdi-weather-windy
      - "\U000F059E" # mdi-weather-windy-variant
      - "\U000F067E" # mdi-weather-lightning-rainy
      - "\U000F067F" # mdi-weather-snowy-rainy
      - "\U000F0A72" # mdi-solar-power
      - "\U000F140B" # mdi-lightning-bolt

spi:
  clk_pin: GPIO14
  mosi_pin: GPIO13
  interface: hardware
  id: spihwd

output:
  - id: pwm_output
    platform: esp8266_pwm
    pin: GPIO05
    inverted: true
    frequency: 1000 Hz

light:
  - platform: monochromatic
    output: pwm_output
    name: "Backlight"
    restore_mode: RESTORE_AND_ON

display:
  - id: my_display
    platform: st7789v
    model: custom
    spi_id: spihwd
    height: 240
    width: 240
    offset_height: 0
    offset_width: 0
    fragmentation: 30
    dc_pin: GPIO00
    reset_pin: GPIO02
    eightbitcolor: False
    update_interval: never
    spi_mode: mode3
    data_rate: 40000000
    auto_clear_enabled: True
    pages:
      - id: framework
        lambda: |-
          id(display_framework).render(it);

display_framework:
  id: display_framework
  display_id: my_display
  time_id: sntp_time
  text_font: text_font_14
  icon_font: icon_font_48
  max_pages: 5
  delimiter: "-|-"
  rotation_interval: 20s
  expiry_interval: 10s
  update_interval: 1s
  show_weather: false
